name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust — fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Rust toolchain
        run: rustup component add rustfmt clippy
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (lib défaut)
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (feature python)
        run: cargo clippy --features python --all-targets -- -D warnings
      - name: Tests
        run: cargo test --release

  python:
    name: Python — wheel + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build & test deps
        run: python -m pip install --upgrade pip maturin numpy pytest
      - name: Build & install wheel
        run: |
          maturin build --release --features python --out dist
          python -m pip install --no-index --find-links dist kontract
      - name: Run pytest
        run: python -m pytest python/tests -q
