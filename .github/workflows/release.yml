name: Release

# Construit les wheels multi-plateformes au push d'un tag `vX.Y.Z` et les
# attache a la GitHub Release correspondante. Les consommateurs peuvent ainsi
# installer une wheel precompilee avec uv, sans toolchain Rust locale.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  wheels:
    name: Wheels — ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"
          - artifact: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2014"
          - artifact: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            manylinux: auto
          - artifact: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            manylinux: auto
          - artifact: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: auto
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --features python --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.artifact }}
          path: dist/*.whl

  release:
    name: Attach wheels to GitHub Release
    needs: wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.whl
