name: Release

# Construit les wheels multi-plateformes au push d'un tag `vX.Y.Z` et les
# attache a la GitHub Release correspondante. Les consommateurs peuvent ainsi
# installer une wheel precompilee avec uv, sans toolchain Rust locale.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  wheels:
    name: Wheels — ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: linux-x86_64
            os: ubuntu-latest
            args: --release --features python --out dist --target x86_64-unknown-linux-gnu --manylinux 2014
          - artifact: linux-aarch64
            os: ubuntu-latest
            args: --release --features python --out dist --target aarch64-unknown-linux-gnu --manylinux 2014
          - artifact: macos-x86_64
            os: macos-13
            args: --release --features python --out dist --target x86_64-apple-darwin
          - artifact: macos-aarch64
            os: macos-14
            args: --release --features python --out dist --target aarch64-apple-darwin
          - artifact: windows-x86_64
            os: windows-latest
            args: --release --features python --out dist --target x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: ${{ matrix.args }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.artifact }}
          path: dist/*.whl

  release:
    name: Attach wheels to GitHub Release
    needs: wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
